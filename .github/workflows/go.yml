# This workflow will build a golang project and deploy the compiled binary to GitHub Pages
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build and deploy undervolt-go

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write   # necessary for releases
  pages: write      # to deploy to Pages
  id-token: write   # to verify the deployment originates from an appropriate source
  attestations: write

jobs:
  # run the job only for the latest tag
  checker:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            # If it's a tag push, check if it's the latest version tag
            LATEST=$(git tag -l "v*" --sort=-v:refname | head -n 1)
            if [ "$GITHUB_REF_NAME" = "$LATEST" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          fi
  # Build job
  build:
    needs: checker
    if: needs.checker.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container: golang:1.26-bookworm # Debian Bullseye-based Go container to ensure maximum GLIBC compatibility (GLIBC 2.31). Everything runs as root.
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Ensures full history, including tags
    - name: Setup Pages
      uses: actions/configure-pages@v6
    # Extract the Git Version & Commit to define dynamic folder names
    - name: Set up Dynamic Folder Names
      run: |
        # Avoid git "dubious ownership" errors inside the container
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        # Save to GITHUB_ENV so subsequent steps can use these variables
        echo "GIT_TAG=$(git describe --tags --always)" >> $GITHUB_ENV
    - name: Prepare dependencies
      run: |
        apt-get update
        apt-get install -y build-essential pkg-config libgl1-mesa-dev mesa-common-dev xorg-dev tree # add 'libglu1-mesa-dev freeglut3-dev' if needed
        go mod tidy # Ensures all required dependencies are installed
        echo "All required dependencies are installed"
    - name: Build undervolt-go
      run: |
        echo "Building Undervolt Go..."
        go build -ldflags="-X 'main.version=${{ env.GIT_TAG }}' -s -w" -o undervolt-go . # When building your application, pass the version from git tags using ldflags.
        echo "Build complete!"
    - name: Build Undervolt Go Pro
      run: |
        echo "Building Undervolt Go Pro..."
        go build -tags=gui,no_emoji,no_animations,no_metadata -ldflags="-X 'main.version=${{ env.GIT_TAG }}' -s -w" -o undervolt-go-pro .
        echo "Build complete!"
    - name: Make compiled binary available
      run: |
        echo "Working on making the compiled binary available..."
        mkdir -p "undervolt-go-${{ env.GIT_TAG }}" "undervolt-go-pro-${{ env.GIT_TAG }}" public
        cp -r ./undervolt-go "./undervolt-go-${{ env.GIT_TAG }}/" # Copy the binary to the undervolt-go directory
        cp -r ./undervolt-go-pro "./undervolt-go-pro-${{ env.GIT_TAG }}/" # Copy the binary to the undervolt-go-pro directory
        cp -rf ./dist/script/cli/* "./undervolt-go-${{ env.GIT_TAG }}/" || true # Copy the install scripts to the undervolt-go directory
        cp -rf ./dist/script/gui/* "./undervolt-go-pro-${{ env.GIT_TAG }}/" || true # Copy the install scripts to the undervolt-go-pro directory
        echo "Ready to deploy!"
    - name: Compress the builds and make them available in 'public'
      run: |
        tar -cJf "./public/undervolt-go-${{ env.GIT_TAG }}.tar.xz" -C "./undervolt-go-${{ env.GIT_TAG }}/" .
        sha256sum "./public/undervolt-go-${{ env.GIT_TAG }}.tar.xz" > "./public/undervolt-go-${{ env.GIT_TAG }}.tar.xz.sha256"
        tar -cJf "./public/undervolt-go-pro-${{ env.GIT_TAG }}.tar.xz" -C "./undervolt-go-pro-${{ env.GIT_TAG }}/" .
        sha256sum "./public/undervolt-go-pro-${{ env.GIT_TAG }}.tar.xz" > "./public/undervolt-go-pro-${{ env.GIT_TAG }}.tar.xz.sha256"
        echo "Compress complete and available in public directory!"
        echo "Removing the now unused directories..."
        rm -r "undervolt-go-${{ env.GIT_TAG }}" "undervolt-go-pro-${{ env.GIT_TAG }}"
        echo "Removing complete!"
    - name: Output the files structure into a JSON file
      run: |
        # GitHub Actions' ubuntu-latest comes preinstalled with tree.
        tree -J public > files.json
        cp -r files.json ./public/
        echo "JSON Manifest generated with the directory structure!"
    - name: Make web pages available
      run: |
        cp -r ./dist/pages/* ./public/ # Copy the web pages to the public directory
        echo "All done!"
    - name: Upload artifact
      # upload artifact in the build stage, so that it is later on accessible in the deploy stage
      uses: actions/upload-pages-artifact@v5
      with:
        # Upload entire repository
        path: './public'
    
    - name: Create Release
      uses: softprops/action-gh-release@v3
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') # Only run for tags
      with:
        draft: true
        body: >-
          Thank you for using Undervolt Go!  
            
          **Installation:**  View [README](https://github.com/Softorage/undervolt-go?tab=readme-ov-file#installation) or visit [official website](https://softorage.github.io/undervolt-go/) for complete installation instructions.  
            
          Star this repo if you find this tool useful!  
            
          ---

        generate_release_notes: true
        files: |
          public/*.tar.xz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  # Deploy job
  deploy:
    # Add a dependency to the build job
    needs: build
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
