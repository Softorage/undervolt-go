# This workflow will build a golang project and deploy the compiled binary to GitHub Pages
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build and deploy undervolt-go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write      # to deploy to Pages
  id-token: write   # to verify the deployment originates from an appropriate source

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Ensures full history, including tags
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.1'
    - name: Setup Pages
      uses: actions/configure-pages@v5
    # Extract the Git Version & Commit to define dynamic folder names
    - name: Set up Dynamic Folder Names
      run: |
        # Save to GITHUB_ENV so subsequent steps can use these variables
        echo "GIT_TAG=$(git describe --tags --always)" >> $GITHUB_ENV
    - name: Prepare dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential pkg-config libgl1-mesa-dev mesa-common-dev xorg-dev # add 'libglu1-mesa-dev freeglut3-dev' if needed
        go mod tidy # Ensures all required dependencies are installed
        echo "All required dependencies are installed"
    - name: Build undervolt-go
      run: |
        echo "Building Undervolt Go..."
        go build -ldflags="-X 'main.version=${{ env.GIT_TAG }}'" -o undervolt-go . # When building your application, pass the version from git tags using ldflags.
        echo "Build complete!"
    - name: Build Undervolt Go Pro
      run: |
        echo "Building Undervolt Go Pro..."
        go build -tags gui -ldflags="-X 'main.version=${{ env.GIT_TAG }}'" -o undervolt-go-pro .
        echo "Build complete!"
    - name: Make compiled binary available
      run: |
        echo "Working on making the compiled binary available..."
        mkdir "undervolt-go-${{ env.GIT_TAG }}" "undervolt-go-pro-${{ env.GIT_TAG }}" public
        cp -r ./undervolt-go "./undervolt-go-${{ env.GIT_TAG }}/" # Copy the binary to the undervolt-go directory
        cp -r ./undervolt-go-pro "./undervolt-go-pro-${{ env.GIT_TAG }}/" # Copy the binary to the undervolt-go-pro directory
        cp -r ./dist/script/cli/* "./undervolt-go-${{ env.GIT_TAG }}/" # Copy the install scripts to the undervolt-go directory
        cp -r ./dist/script/gui/* "./undervolt-go-pro-${{ env.GIT_TAG }}/" # Copy the install scripts to the undervolt-go-pro directory
        echo "Ready to deploy!"
    - name: Compress the builds and make them available in 'public'
      run: |
        zip -r undervolt-go-${{ env.GIT_TAG }}.zip "./undervolt-go-${{ env.GIT_TAG }}/" # Make a zip file of the latest build
        zip -r undervolt-go-pro-${{ env.GIT_TAG }}.zip "./undervolt-go-pro-${{ env.GIT_TAG }}/" # Make a zip file of the latest-pro build
        cp -r undervolt-go-${{ env.GIT_TAG }}.zip ./public/
        cp -r undervolt-go-pro-${{ env.GIT_TAG }}.zip ./public/
        echo "Compress complete and available in public directory!"
        echo "Removing the now unused directories and archives..."
        rm -r undervolt-go-${{ env.GIT_TAG }}.zip undervolt-go-pro-${{ env.GIT_TAG }}.zip "undervolt-go-${{ env.GIT_TAG }}" "undervolt-go-pro-${{ env.GIT_TAG }}"
        echo "Removing complete!"
    - name: Output the files structure into a JSON file
      run: |
        # GitHub Actions' ubuntu-latest comes preinstalled with tree.
        tree -J public > files.json
        cp -r files.json ./public/
        echo "JSON Manifest generated with the directory structure!"
    - name: Make web pages available
      run: |
        cp -r ./dist/pages/* ./public/ # Copy the web pages to the public directory
        echo "All done!"
    - name: Upload artifact
      # upload artifact in the build stage, so that it is later on accessible in the deploy stage
      uses: actions/upload-pages-artifact@v3
      with:
        # Upload entire repository
        path: './public'
  
  # Deploy job
  deploy:
    # Add a dependency to the build job
    needs: build
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4